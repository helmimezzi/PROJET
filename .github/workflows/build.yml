name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.helmimezzi }}
          password: ${{ secrets.Helmi-555 }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.helmimezzi }}/projet-smd:${{ github.sha }} .
          docker tag ${{ secrets.helmimezzi }}/projet-smd:${{ github.sha }} \
                     ${{ secrets.helmimezzi }}/projet-smd:latest

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.helmimezzi }}/projet-smd:${{ github.sha }}
          docker push ${{ secrets.helmimezzi }}/projet-smd:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'projet-smd-app'
          images: '${{ secrets.helmimezzi }}/projet-smd:latest'
